<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Timetable - College ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation Bar -->
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="max-w-screen-2xl mx-auto px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fas fa-graduation-cap text-2xl"></i>
                <span class="text-2xl font-bold">College ERP</span>
            </div>
            <div class="flex items-center gap-8">
                <a href="#" class="hover:text-blue-200">Users</a>
                <a href="#" class="hover:text-blue-200">Students</a>
                <a href="#" class="hover:text-blue-200">Timetable</a>
            </div>
            <div class="flex items-center gap-2">
                <i class="fas fa-user-circle text-xl"></i>
                <span>admin</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-screen-2xl mx-auto px-8 py-8">
        <!-- Header -->
        <div class="mb-8 pb-6 border-l-4 border-blue-600">
            <h1 class="text-4xl font-bold text-gray-800">Class Timetable</h1>
            <p class="text-gray-600 mt-2">Your weekly schedule</p>
        </div>

        <!-- Timetable Table -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full">
                <thead>
                    <tr class="bg-blue-600 text-white">
                        <th class="px-6 py-4 text-left font-bold">Time</th>
                        <th class="px-6 py-4 text-left font-bold">Monday</th>
                        <th class="px-6 py-4 text-left font-bold">Tuesday</th>
                        <th class="px-6 py-4 text-left font-bold">Wednesday</th>
                        <th class="px-6 py-4 text-left font-bold">Thursday</th>
                        <th class="px-6 py-4 text-left font-bold">Friday</th>
                        <th class="px-6 py-4 text-left font-bold">Saturday</th>
                    </tr>
                </thead>
                <tbody>
                    {% for time in times %}
                    <tr class="border-b border-gray-200">
                        <td class="px-6 py-4 font-semibold text-gray-800 bg-gray-50">{{ time }}</td>
                        <td class="px-6 py-4"></td>
                        <td class="px-6 py-4"></td>
                        <td class="px-6 py-4"></td>
                        <td class="px-6 py-4"></td>
                        <td class="px-6 py-4"></td>
                        <td class="px-6 py-4"></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const times = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00'];
    </script>
</body>
</html>
