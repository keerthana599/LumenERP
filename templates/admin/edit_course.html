{% extends "base_portal.html" %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 py-8">
    <div class="max-w-4xl mx-auto px-4">
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-gray-800">Edit Course</h1>
            <p class="text-gray-600 mt-2">Update course information</p>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-8">
            <form method="POST" class="space-y-6">
                
                <!-- Course Code -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Course Code <span class="text-red-500">*</span></label>
                    <input type="text" name="code" required value="{{ course.code }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" maxlength="20">
                </div>

                <!-- Course Name -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Course Name <span class="text-red-500">*</span></label>
                    <input type="text" name="name" required value="{{ course.name }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                </div>

                <!-- Description -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Description</label>
                    <textarea name="description" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">{{ course.description or '' }}</textarea>
                </div>

                <!-- Department -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Department <span class="text-red-500">*</span></label>
                    <select name="department_id" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                        {% for dept in departments %}
                            <option value="{{ dept.id }}" {% if dept.id == course.department_id %}selected{% endif %}>{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Semester -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Number of Semesters <span class="text-red-500">*</span></label>
                    <select name="semester" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                        {% for sem in range(1, 9) %}
                            <option value="{{ sem }}" {% if sem == course.semester %}selected{% endif %}>{{ sem }} Semester{% if sem > 1 %}s{% endif %}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Faculty -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Assign Faculty <span class="text-red-500">*</span></label>
                    <select name="faculty_id" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                        <option value="">Select Faculty</option>
                        {% for fac in faculty %}
                            <option value="{{ fac.id }}" {% if fac.id == course.faculty_id %}selected{% endif %}>{{ fac.user.username }} ({{ fac.department_ref.code }})</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Buttons -->
                <div class="flex space-x-4">
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition">
                        <i class="fas fa-save mr-2"></i>Update Course
                    </button>
                    <a href="{{ url_for('admin.manage_courses') }}" class="flex-1 text-center bg-gray-400 hover:bg-gray-500 text-white font-bold py-3 px-4 rounded-lg transition">
                        <i class="fas fa-times mr-2"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
