{% extends "base_portal.html" %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 py-8">
    <div class="max-w-4xl mx-auto px-4">
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-gray-800">Edit Faculty Member</h1>
            <p class="text-gray-600 mt-2">Update faculty information</p>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-8">
            <form method="POST" class="space-y-6">
                
                <!-- Username (Read-only) -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Username</label>
                    <input type="text" value="{{ faculty.user.username }}" disabled class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-100">
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Email</label>
                    <input type="email" name="email" value="{{ faculty.user.email }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                </div>

                <!-- Department -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Department</label>
                    <select name="department_id" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                        {% for dept in departments %}
                            <option value="{{ dept.id }}" {% if dept.id == faculty.department_id %}selected{% endif %}>{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Designation -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Designation</label>
                    <input type="text" name="designation" value="{{ faculty.designation }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                </div>

                <!-- Qualification -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Qualification</label>
                    <input type="text" name="qualification" value="{{ faculty.qualification or '' }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                </div>

                <!-- Specialization -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Specialization</label>
                    <input type="text" name="specialization" value="{{ faculty.specialization or '' }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                </div>

                <!-- Phone -->
                <div class="country-phone-group">
                    <label class="block text-gray-700 font-bold mb-2">Phone</label>
                    <div class="flex gap-2">
                        <select class="country-select w-56 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" data-initial="IN">
                            <option value="">Select Country</option>
                            <option value="AE">+971 United Arab Emirates</option>
                            <option value="AU">+61 Australia</option>
                            <option value="BD">+880 Bangladesh</option>
                            <option value="CA">+1 Canada</option>
                            <option value="DE">+49 Germany</option>
                            <option value="FR">+33 France</option>
                            <option value="GB">+44 United Kingdom</option>
                            <option value="IN">+91 India</option>
                            <option value="IT">+39 Italy</option>
                            <option value="JP">+81 Japan</option>
                            <option value="MY">+60 Malaysia</option>
                            <option value="NZ">+64 New Zealand</option>
                            <option value="PK">+92 Pakistan</option>
                            <option value="SG">+65 Singapore</option>
                            <option value="US">+1 United States</option>
                        </select>
                        <input type="tel" name="phone" value="{{ faculty.phone or '' }}" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" maxlength="10">
                    </div>
                    <p class="text-gray-500 text-sm mt-1 phone-hint">Select a country to format phone number</p>
                    <p class="text-red-500 text-sm mt-1 phone-error" style="display: none;"></p>
                </div>

                <!-- Office -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Office Location</label>
                    <input type="text" name="office" value="{{ faculty.office or '' }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                </div>

                <!-- Buttons -->
                <div class="flex space-x-4">
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition">
                        <i class="fas fa-save mr-2"></i>Update Faculty
                    </button>
                    <a href="{{ url_for('admin.manage_faculty') }}" class="flex-1 text-center bg-gray-400 hover:bg-gray-500 text-white font-bold py-3 px-4 rounded-lg transition">
                        <i class="fas fa-times mr-2"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
// Initialize phone field validation
document.addEventListener('DOMContentLoaded', function() {
    const countrySelects = document.querySelectorAll('.country-select');
    countrySelects.forEach(select => {
        // Set default value and initialize phone field
        const initial = select.dataset.initial || 'IN';
        select.value = initial;
        
        // Update phone field maxlength and hints
        const phoneInput = select.closest('.country-phone-group')?.querySelector('input[type="tel"]');
        if (phoneInput && window.COUNTRY_PHONE_DATA && window.COUNTRY_PHONE_DATA[initial]) {
            const countryData = window.COUNTRY_PHONE_DATA[initial];
            phoneInput.maxLength = countryData.maxDigits;
            phoneInput.dataset.countryCode = initial;
            phoneInput.dataset.maxDigits = countryData.maxDigits;
            phoneInput.placeholder = `${countryData.maxDigits} digit number`;
            
            const hint = select.closest('.country-phone-group')?.querySelector('.phone-hint');
            if (hint) {
                hint.textContent = `${countryData.name} (${countryData.code}): Max ${countryData.maxDigits} digits`;
            }
        }
        
        // Add change event listener for country selection
        select.addEventListener('change', function(e) {
            if (window.handleCountryChange) {
                window.handleCountryChange(e);
            }
        });
    });
});
</script>
{% endblock %}
