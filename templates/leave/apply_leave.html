{% extends "base_student_portal.html" if current_user.role == 'student' else "base_portal.html" %}

{% block title %}Apply for Leave - College ERP{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="bg-yellow-50 rounded-lg p-6 border-l-4 border-yellow-600">
        <h1 class="text-3xl font-bold text-gray-800">Apply for Leave</h1>
        <p class="text-gray-600 mt-2">Submit your leave application</p>
    </div>

    <div class="max-w-4xl">
        <div class="bg-white rounded-lg shadow-md p-8">
            <form method="POST" class="space-y-6">
                <!-- Start Date -->
                <div>
                    <label for="start_date" class="block text-sm font-semibold text-gray-700 mb-2">
                        Start Date
                    </label>
                    <input type="date" id="start_date" name="start_date" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>

                <!-- End Date -->
                <div>
                    <label for="end_date" class="block text-sm font-semibold text-gray-700 mb-2">
                        End Date
                    </label>
                    <input type="date" id="end_date" name="end_date" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>

                <!-- Leave Type -->
                <div>
                    <label for="leave_type" class="block text-sm font-semibold text-gray-700 mb-2">
                        Leave Type
                    </label>
                    <select id="leave_type" name="leave_type" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white">
                        {% for value, label in leave_types %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Reason -->
                <div>
                    <label for="reason" class="block text-sm font-semibold text-gray-700 mb-2">
                        Reason for Leave
                    </label>
                    <textarea id="reason" name="reason" rows="5" required
                              placeholder="Please provide a brief reason for your leave application..."
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                </div>

                <!-- Buttons -->
                <div class="flex gap-4">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-8 rounded-lg transition">
                        <i class="fas fa-paper-plane mr-2"></i>Submit Application
                    </button>
                    <a href="{{ url_for('student.my_leaves') if current_user.role == 'student' else url_for('faculty.my_leaves') }}" class="bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-8 rounded-lg transition">
                        View My Leaves
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
